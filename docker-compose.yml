version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: loanflow_db
    environment:
      POSTGRES_DB: loanflow_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: loanflow123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: loanflow_backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/loanflow_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: loanflow123
      JWT_SECRET: loanflow_super_secret_key_tecsup_2025_examen_final_stefano
      JWT_EXPIRATION: 86400000
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000

volumes:
  postgres_data:
